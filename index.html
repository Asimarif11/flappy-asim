<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#72d4e9">
  <title>flappy-asim</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <div class="brand" aria-label="flappy-asim">flappy<span>-asim</span></div>
    <div class="screen-frame">
      <canvas id="game" width="480" height="720" aria-label="flappy-asim game"></canvas>
      <div class="hud" aria-live="polite"><span id="score">0</span><span id="best">BEST 0</span></div>
      <section id="panel" class="panel" aria-live="polite">
        <p class="eyebrow">A tiny sky adventure</p>
        <h1 id="panel-title">flappy-asim</h1>
        <p id="panel-copy">Tap, click, or press <strong>↑</strong> to fly</p>
        <button id="action" type="button" aria-controls="game" aria-describedby="panel-copy">Start flying</button>
        <p class="hint">Up Arrow · Space · click / tap</p>
      </section>
    </div>
    <p class="footer">Stay light. Watch the gaps.</p>
  </main>
  <script src="game-logic.js"></script>
  <script src="game.js"></script>
</body>
</html>
